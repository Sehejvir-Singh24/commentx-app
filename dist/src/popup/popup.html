<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CommentX Settings</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 16px; width: 300px; background: #fff; color: #333; }
    h2 { margin-top: 0; color: #333; font-size: 20px; }
    .form-group { margin-bottom: 12px; }
    label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 14px; }
    input[type="text"], select { width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    input[type="range"] { width: 100%; }
    .hidden { display: none; }
    button { width: 100%; padding: 8px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
    button:hover { background: #1976D2; }
    .toggle-container { display: flex; align-items: center; gap: 8px; font-weight: bold; }
  </style>
  <script type="module" crossorigin src="/assets/popup.js"></script>
</head>
<body>
  <h2>CommentX</h2>
  
  <div class="form-group">
    <label class="toggle-container">
      <input type="checkbox" id="enableToggle"> Enable on this tab
    </label>
  </div>

  <div class="form-group">
    <label>Mode</label>
    <select id="modeSelect">
      <option value="sports">Sports</option>
      <option value="gaming">Gaming</option>
      <option value="documentary">Documentary</option>
      <option value="custom">Custom</option>
    </select>
  </div>

  <div class="form-group hidden" id="customPromptGroup">
    <label>Custom Persona Prompt</label>
    <input type="text" id="customPrompt" placeholder="You are a sarcastic robot...">
  </div>

  <div class="form-group">
    <label>Voice</label>
    <select id="voiceSelect">
      <option value="21m00Tcm4TlvDq8ikWAM">Rachel (Default)</option>
      <option value="EXAVITQu4vr4xnSDxMaL">Bella</option>
      <option value="pNInz6obpgDQGcFmaJcg">Adam</option>
    </select>
  </div>

  <div class="form-group">
    <label>Volume</label>
    <input type="range" id="volumeSlider" min="0" max="100" value="50">
  </div>

  <div class="form-group">
    <label>Proxy URL</label>
    <input type="text" id="proxyUrl" placeholder="https://commentx-proxy.workers.dev">
  </div>

  <div class="form-group">
    <label>Auth Token</label>
    <input type="text" id="authToken" placeholder="Secret Token">
  </div>

  <button id="saveBtn">Save Settings</button>

</body>
</html>
